name: Deploy to GitHub Pages

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE44_APP_ID: 69fe4ed5912775ef1d08d528
          VITE_BASE44_APP_BASE_URL: https://kopperstone.com

      - name: Fix client-side routing (SPA fallback)
        run: cp dist/index.html dist/404.html

      - name: Deploy built files to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save dist to temp location outside repo
          cp -r dist /tmp/site-dist
          git fetch origin main
          git checkout main
          # Remove everything except .git
          find . -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +
          # Copy built files to root
          cp -r /tmp/site-dist/. .
          git add -A
          git diff --cached --quiet || git commit -m "deploy: update built site from source"
          git push origin main
